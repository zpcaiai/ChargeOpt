version: "3.9"

# ── Secrets ──────────────────────────────────────────────────────────────────
# Create these files before running:
#   echo "chargeopt_dev_password" > secrets/db_password.txt
#   echo "admin_dev_password"     > secrets/pgadmin_password.txt
secrets:
  db_password:
    file: ./secrets/db_password.txt
  pgadmin_password:
    file: ./secrets/pgadmin_password.txt

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://chargeopt@postgres:5432/chargeopt?password_file=/run/secrets/db_password
      ENVIRONMENT: development
      LOG_LEVEL: info
      WORKERS: 2
      CHARGEOPT_SKIP_DB_MIGRATION: "0"
    secrets:
      - db_password
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    networks:
      - chargeopt

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chargeopt
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: chargeopt
    secrets:
      - db_password
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chargeopt -d chargeopt"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 10
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    networks:
      - chargeopt

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@chargeopt.local
      PGADMIN_DEFAULT_PASSWORD_FILE: /run/secrets/pgadmin_password
    secrets:
      - pgadmin_password
    ports:
      - "127.0.0.1:5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - chargeopt

volumes:
  pg_data:
  pgadmin_data:

networks:
  chargeopt:
    driver: bridge
